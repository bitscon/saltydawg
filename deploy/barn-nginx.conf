server {
    listen 80;
    server_name dev.saltydawg2.net;

    root /home/billyb/workspaces/saltydawg/dist;
    index index.html;

    # Static asset caching (js, css, images, fonts)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All other paths — serve index.html (single-page app fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
